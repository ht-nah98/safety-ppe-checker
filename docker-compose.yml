version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/static:/app/static
      - ./data:/app/data
      - ./models_weights:/app/models_weights
    environment:
      - DATABASE_URL=sqlite:///./ppe_checker.db
      - MODEL_PATH=./models_weights/best.pt
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
